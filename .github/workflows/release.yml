name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build-jar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - name: Install local cgview dependency
        run: >
          mvn install:install-file
          -Dfile=cgview/cgview.jar
          -DgroupId=ca.ualberta.stothard.cgview
          -DartifactId=cgview
          -Dversion=2.0.3-SNAPSHOT
          -Dpackaging=jar
          -q
      - run: mvn clean package -q
      - uses: actions/upload-artifact@v4
        with:
          name: BRIG-jar
          path: |
            target/BRIG.jar
            target/brig-cli.jar

  package-macos:
    needs: build-jar
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - uses: actions/download-artifact@v4
        with:
          name: BRIG-jar
          path: target/
      - name: Download BLAST+ for macOS
        run: |
          BLAST_FTP="https://ftp.ncbi.nlm.nih.gov/blast/executables/blast+/LATEST/"
          BLAST_FILE=$(curl -sL "$BLAST_FTP" | grep -oE 'ncbi-blast-[0-9.]+[+]-aarch64-macosx\.tar\.gz' | head -1)
          echo "Downloading $BLAST_FILE"
          curl -sL "${BLAST_FTP}${BLAST_FILE}" -o blast.tar.gz
          mkdir -p target/blast
          tar xzf blast.tar.gz
          BLAST_DIR=$(ls -d ncbi-blast-*)
          for bin in blastn blastp blastx tblastn tblastx makeblastdb; do
            cp "$BLAST_DIR/bin/$bin" target/blast/
          done
      - name: Create macOS DMG
        run: |
          jpackage \
            --type dmg \
            --name BRIG \
            --app-version ${GITHUB_REF_NAME#v} \
            --input target \
            --main-jar BRIG.jar \
            --main-class brig.Main \
            --java-options "-Xmx1500M" \
            --dest dist/
      - uses: actions/upload-artifact@v4
        with:
          name: BRIG-macos
          path: dist/*.dmg

  package-windows:
    needs: build-jar
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - uses: actions/download-artifact@v4
        with:
          name: BRIG-jar
          path: target/
      - name: Download BLAST+ for Windows
        shell: bash
        run: |
          BLAST_FTP="https://ftp.ncbi.nlm.nih.gov/blast/executables/blast+/LATEST/"
          BLAST_FILE=$(curl -sL "$BLAST_FTP" | grep -oE 'ncbi-blast-[0-9.]+[+]-x64-win64\.tar\.gz' | head -1)
          echo "Downloading $BLAST_FILE"
          curl -sL "${BLAST_FTP}${BLAST_FILE}" -o blast.tar.gz
          mkdir -p target/blast
          tar xzf blast.tar.gz
          BLAST_DIR=$(ls -d ncbi-blast-*)
          for bin in blastn blastp blastx tblastn tblastx makeblastdb; do
            cp "$BLAST_DIR/bin/${bin}.exe" target/blast/
          done
      - name: Create Windows MSI
        shell: bash
        run: |
          jpackage \
            --type msi \
            --name BRIG \
            --app-version ${GITHUB_REF_NAME#v} \
            --input target \
            --main-jar BRIG.jar \
            --main-class brig.Main \
            --java-options "-Xmx1500M" \
            --win-menu \
            --win-shortcut \
            --dest dist/
      - uses: actions/upload-artifact@v4
        with:
          name: BRIG-windows
          path: dist/*.msi

  create-release:
    needs: [build-jar, package-macos, package-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/BRIG-jar/BRIG.jar
            artifacts/BRIG-jar/brig-cli.jar
            artifacts/BRIG-macos/*.dmg
            artifacts/BRIG-windows/*.msi
          generate_release_notes: true
